<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f6f8" />
  <title>Personal AI OS · 个人AI工作操作系统</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-row">
        <button class="brand" data-route="home" aria-label="回到首页"><span class="brand-logo">P</span><span><b>Personal AI OS</b><small>个人AI工作操作系统</small></span></button>
        <button class="icon-btn mobile-only" data-action="close-sidebar" aria-label="关闭菜单"><span data-icon="x"></span></button>
      </div>
      <div class="workspace-switch"><span class="avatar">林</span><span><b>我的工作空间</b><small><i></i> 本地数据已连接</small></span><button class="icon-btn" data-action="open-settings" aria-label="工作空间设置"><span data-icon="settings"></span></button></div>
      <nav id="mainNav" class="main-nav" aria-label="主菜单"></nav>
      <div class="sidebar-bottom">
        <div class="local-meter"><div><span><i data-icon="database"></i> 本地存储</span><b id="storageText">计算中</b></div><div class="meter"><i id="storageBar"></i></div></div>
        <button class="sidebar-settings" data-route="settings"><span data-icon="settings"></span>设置<span class="api-state" id="apiState">模拟模式</span></button>
      </div>
    </aside>
    <div class="sidebar-mask" data-action="close-sidebar"></div>

    <main class="main-area">
      <header class="topbar">
        <div class="top-left"><button class="icon-btn menu-btn" data-action="open-sidebar" aria-label="打开菜单"><span data-icon="menu"></span></button><div><span class="breadcrumb">PERSONAL AI OS</span><h1 id="topTitle">首页</h1></div></div>
        <button class="command-search" data-action="open-command"><span data-icon="search"></span><span>搜索功能或文件</span><kbd>⌘ K</kbd></button>
        <div class="top-actions"><span class="save-indicator" id="saveIndicator"><i></i> 已保存到本地</span><button class="icon-btn" data-action="toggle-theme" aria-label="切换主题"><span data-icon="moon"></span></button><button class="primary-btn compact" data-action="quick-new"><span data-icon="plus"></span><span>快速新建</span></button></div>
      </header>
      <div class="workspace" id="workspace" aria-live="polite"></div>
    </main>

    <nav class="mobile-nav" aria-label="手机导航">
      <button data-route="home"><span data-icon="home"></span><small>首页</small></button>
      <button data-route="chat"><span data-icon="message"></span><small>AI聊天</small></button>
      <button class="mobile-create" data-action="quick-new"><span data-icon="plus"></span></button>
      <button data-route="files"><span data-icon="folder"></span><small>文件</small></button>
      <button data-action="open-sidebar"><span data-icon="apps"></span><small>全部</small></button>
    </nav>
  </div>

  <div class="modal-layer" id="modalLayer" aria-hidden="true">
    <div class="modal" id="modalContent"></div>
  </div>
  <div class="toast-stack" id="toastStack"></div>

  <script src="vendor/xlsx/xlsx.full.min.js"></script>
  <script src="vendor/jszip/jszip.min.js"></script>
  <script src="vendor/pdf-lib/pdf-lib.min.js"></script>
  <script src="vendor/mammoth/mammoth.browser.min.js"></script>
  <script src="vendor/tesseract/tesseract.min.js"></script>
  <script src="core.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
